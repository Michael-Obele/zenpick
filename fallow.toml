# fallow.toml - Codebase analysis configuration
# See https://docs.fallow.tools for documentation

# SvelteKit entry points: route files and the lib barrel are loaded by the framework.
entry = ["src/routes/**/*.{ts,svelte}", "src/lib/**/*.ts"]

[duplicates]
# Hide pair-only clones; focus on widespread copy-paste worth refactoring.
# Lower to 2 to report every duplicate pair.
minOccurrences = 3

# shadcn-svelte barrel files re-export primitive aliases (Root, Button, Table, etc.)
# that are part of the public component API. These are false positives for dead-export
# analysis and should not be removed.
[[ignoreExports]]
file = "src/lib/components/ui/**/index.ts"
exports = ["*"]

[health]
# CRAP is inflated when fallow estimates 0% coverage. Most of these functions are
# simple mappings/switches; raising the CRAP ceiling keeps them advisory rather
# than blocking commits while still catching genuinely risky complexity.
maxCrap = 160.0

# Known-safe helpers that are intentionally long mapping tables. Keep visible but
# don't block commits.
[[health.thresholdOverrides]]
files = ["src/lib/server/inference.ts"]
functions = ["inferPricing", "inferContextWindow"]
maxCyclomatic = 8
reason = "Static lookup tables for known model pricing and context windows"

# Per-issue-type severity: "error" (fail CI), "warn" (report only), "off" (ignore)
[rules]
